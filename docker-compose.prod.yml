services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewer
      POSTGRES_PASSWORD: interviewer
      POSTGRES_DB: interviewer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://interviewer:interviewer@postgres:5432/interviewer"
    volumes:
      - interview_data:/app/interview_store
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # No ports exposed — Caddy handles external traffic

  agent:
    build:
      context: .
      target: agent
    env_file: .env
    volumes:
      - interview_data:/app/interview_store
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  interview_data:
  upload_data:
  caddy_data:
  caddy_config:
