<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Interview · 26Pixel</title>

    <!-- LiveKit -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

    <!-- Type -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Shared design system -->
    <link rel="stylesheet" href="/assets/design-system.css">

    <style>
        /* =====================================================================
           PAGE-SPECIFIC LAYOUT — realtime_interview.html
           Full-bleed dark forest "studio" with right-side context panel.
           Every JS-touched ID and class from the original page is preserved.
           ===================================================================== */

        body {
            background: var(--forest-800);
            color: var(--paper);
            min-height: 100vh;
            font-family: var(--font-sans);
        }

        .page-container {
            max-width: 1480px;
            margin: 0 auto;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* ---------- Header ---------- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 24px;
            padding-bottom: 18px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(247, 244, 236, 0.08);
        }
        .header h1 {
            font-family: var(--font-serif); font-weight: 400;
            font-size: 22px; letter-spacing: -0.01em;
            color: var(--paper); margin: 0; line-height: 1.2;
        }
        .header .subtitle {
            font-size: 12.5px; color: rgba(247, 244, 236, 0.55);
            margin-top: 2px;
        }
        .header-meta { display: flex; align-items: center; gap: 14px; }

        /* ---------- Status bar ---------- */
        .status-bar {
            padding: 10px 16px;
            border-radius: var(--r-md);
            text-align: center;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin-bottom: 16px;
            border: 1px solid transparent;
            transition: all .25s var(--ease);
        }
        .status-bar.hidden { display: none; }
        .status-bar.connecting {
            background: rgba(198, 138, 46, 0.14);
            color: #F2D27D;
            border-color: rgba(198, 138, 46, 0.3);
        }
        .status-bar.connected {
            background: rgba(79, 125, 99, 0.18);
            color: #B6D2C2;
            border-color: rgba(79, 125, 99, 0.35);
        }
        .status-bar.error {
            background: rgba(184, 58, 42, 0.18);
            color: #F1A89A;
            border-color: rgba(184, 58, 42, 0.4);
        }

        /* ---------- Interview timer (kept selectors for warning/critical) ---------- */
        .interview-timer {
            display: none;
            align-items: center; gap: 14px;
            padding: 8px 16px;
            background: rgba(247, 244, 236, 0.06);
            border: 1px solid rgba(247, 244, 236, 0.1);
            border-radius: 999px;
            font-family: var(--font-mono);
        }
        .interview-timer.visible { display: inline-flex; }
        .interview-timer .time-display {
            font-size: 18px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--paper);
            letter-spacing: 0.04em;
        }
        .interview-timer .time-label {
            font-size: 9.5px;
            color: rgba(247, 244, 236, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.16em;
        }
        .interview-timer.warning  { border-color: rgba(198, 138, 46, 0.5); }
        .interview-timer.warning  .time-display { color: #F2C77D; }
        .interview-timer.critical { border-color: rgba(184, 58, 42, 0.55); background: rgba(184, 58, 42, 0.12); }
        .interview-timer.critical .time-display { color: #F1A89A; }

        /* ---------- Main layout ---------- */
        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 18px;
            align-items: stretch;
        }
        @media (max-width: 980px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .left-panel { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
        .right-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }
        .right-panel.visible { display: flex; }
        @media (max-width: 980px) {
            .right-panel { max-height: 60vh; }
        }

        /* ---------- Interview info card (the "Position / Candidate / Questions" tile) ---------- */
        .interview-info {
            display: none;
            background: rgba(247, 244, 236, 0.04);
            border: 1px solid rgba(247, 244, 236, 0.08);
            border-radius: var(--r-md);
            padding: 16px 20px;
        }
        .interview-info.visible { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
        @media (max-width: 720px) { .interview-info.visible { grid-template-columns: 1fr; } }
        .interview-info h3 {
            display: none; /* hidden in new layout — info comes from individual cells */
        }
        .interview-info p {
            margin: 0;
            display: flex; flex-direction: column; gap: 4px;
            color: var(--paper);
        }
        .interview-info p strong {
            font-family: var(--font-mono);
            font-size: 9.5px; font-weight: 600;
            letter-spacing: 0.16em; text-transform: uppercase;
            color: rgba(247, 244, 236, 0.5);
        }
        .interview-info p span {
            font-family: var(--font-serif);
            font-size: 20px; font-weight: 400;
            color: var(--paper);
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        /* ---------- Video container ---------- */
        .video-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            transition: all .4s var(--ease);
        }
        .video-box {
            position: relative;
            background: linear-gradient(135deg, #2A4A3B, var(--forest-800));
            border-radius: var(--r-lg);
            overflow: hidden;
            aspect-ratio: 16/9;
            width: 100%;
            max-width: 760px;
            border: 1px solid rgba(247, 244, 236, 0.08);
            transition: all .4s var(--ease);
        }
        .video-container.two-up .video-box {
            max-width: none;
            width: calc(50% - 8px);
        }
        @media (max-width: 760px) {
            .video-container.two-up { flex-direction: column; align-items: center; }
            .video-container.two-up .video-box { width: 100%; max-width: 600px; }
        }
        .video-box video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .video-label {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(15, 31, 26, 0.7);
            backdrop-filter: blur(8px);
            color: var(--paper);
            padding: 5px 11px;
            border-radius: 999px;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.02em;
        }
        /* Decorative monogram while video isn't yet streaming */
        .video-box::before {
            content: attr(data-monogram);
            position: absolute; inset: 0;
            display: grid; place-items: center;
            font-family: var(--font-serif);
            font-size: 64px; font-weight: 400;
            color: rgba(247, 244, 236, 0.3);
            pointer-events: none;
            transition: opacity .3s var(--ease);
        }
        /* Hide the monogram once a track is attached — driven from JS via .has-track,
           because srcObject is a JS property and `:has(video[srcobject])` never matches. */
        .video-box.has-track::before { opacity: 0; }
        #remoteVideoBox { background: linear-gradient(135deg, var(--terra-700), var(--forest-700)); }
        #remoteVideoBox::before { color: rgba(247, 244, 236, 0.7); }

        .hidden { display: none !important; }

        /* ---------- Controls ---------- */
        .controls {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        /* Reset baseline button styles for this page (they cascade from the original) */
        button, .btn-link {
            padding: 10px 20px; border: none; border-radius: 10px;
            font-size: 13.5px; font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: transform .12s var(--ease), background .15s var(--ease), box-shadow .15s var(--ease);
            text-decoration: none; display: inline-block;
        }
        button:hover, .btn-link:hover { transform: translateY(-1px); }

        .btn-primary {
            background: var(--terra-500); color: white;
        }
        .btn-primary:hover { background: var(--terra-600); box-shadow: var(--shadow-md); }

        .btn-secondary {
            background: rgba(247, 244, 236, 0.08);
            color: var(--paper);
            border: 1px solid rgba(247, 244, 236, 0.12);
        }
        .btn-secondary:hover { background: rgba(247, 244, 236, 0.14); }

        .btn-danger { background: var(--error); color: white; }
        .btn-danger:hover { background: #9C2E20; box-shadow: var(--shadow-md); }

        /* ---------- Right panel: Question list ---------- */
        .question-panel {
            background: var(--forest-900);
            border: 1px solid rgba(247, 244, 236, 0.08);
            border-radius: var(--r-lg);
            overflow: hidden;
            display: flex; flex-direction: column;
            max-height: 45%;
            min-height: 220px;
        }
        .question-panel-header {
            padding: 14px 18px;
            font-family: var(--font-mono);
            font-size: 10.5px;
            font-weight: 600; letter-spacing: 0.14em;
            color: rgba(247, 244, 236, 0.6);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(247, 244, 236, 0.08);
            background: rgba(247, 244, 236, 0.02);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .question-panel-header span { color: var(--terra-300); }

        .question-list {
            overflow-y: auto;
            flex: 1;
            padding: 8px;
        }
        .question-list::-webkit-scrollbar { width: 8px; }
        .question-list::-webkit-scrollbar-track { background: transparent; }
        .question-list::-webkit-scrollbar-thumb {
            background: rgba(247, 244, 236, 0.1); border-radius: 4px;
        }
        .question-list::-webkit-scrollbar-thumb:hover { background: rgba(247, 244, 236, 0.2); }

        /* q-item — kept selector + state classes (active / answered / skipped) */
        .q-item {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.45;
            color: rgba(247, 244, 236, 0.6);
            background: rgba(247, 244, 236, 0.03);
            border: 1px solid transparent;
            transition: all .25s var(--ease);
        }
        .q-item:last-child { margin-bottom: 0; }
        .q-item .q-icon {
            flex-shrink: 0;
            font-size: 12px;
            margin-top: 2px;
            opacity: 0.7;
        }

        .q-item.active {
            background: var(--terra-700);
            color: var(--paper);
            border-color: var(--terra-500);
        }
        .q-item.active .q-icon {
            color: var(--terra-300);
            opacity: 1;
            animation: ds-pulse 1.6s ease-in-out infinite;
        }

        .q-item.answered {
            opacity: 0.55;
            background: rgba(79, 125, 99, 0.08);
        }
        .q-item.answered .q-icon { color: var(--success); opacity: 1; }

        .q-item.skipped {
            opacity: 0.4;
        }
        .q-item.skipped .q-icon { color: rgba(247, 244, 236, 0.4); }

        /* ---------- Right panel: Transcript ---------- */
        .transcript-panel {
            background: var(--forest-900);
            border: 1px solid rgba(247, 244, 236, 0.08);
            border-radius: var(--r-lg);
            flex: 1;
            overflow: hidden;
            display: flex; flex-direction: column;
            min-height: 220px;
        }
        .transcript-panel-header {
            padding: 14px 18px;
            font-family: var(--font-mono);
            font-size: 10.5px;
            font-weight: 600; letter-spacing: 0.14em;
            color: rgba(247, 244, 236, 0.6);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(247, 244, 236, 0.08);
            background: rgba(247, 244, 236, 0.02);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .transcript-panel-header::after {
            content: "live";
            color: var(--terra-300);
            font-weight: 600;
        }

        .transcript-list {
            overflow-y: auto;
            flex: 1;
            padding: 12px 8px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .transcript-list::-webkit-scrollbar { width: 8px; }
        .transcript-list::-webkit-scrollbar-track { background: transparent; }
        .transcript-list::-webkit-scrollbar-thumb {
            background: rgba(247, 244, 236, 0.1); border-radius: 4px;
        }
        .transcript-list::-webkit-scrollbar-thumb:hover { background: rgba(247, 244, 236, 0.2); }

        .transcript-empty {
            padding: 28px 16px;
            text-align: center;
            color: rgba(247, 244, 236, 0.4);
            font-size: 12.5px;
        }

        /* transcript-entry — kept selector and modifier classes */
        .transcript-entry {
            display: flex; flex-direction: column; gap: 4px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .transcript-entry.interviewer {
            background: rgba(212, 98, 58, 0.1);
            border: 1px solid rgba(212, 98, 58, 0.18);
        }
        .transcript-entry.candidate {
            background: rgba(119, 159, 135, 0.08);
            border: 1px solid rgba(119, 159, 135, 0.18);
        }
        .transcript-entry .speaker-label {
            font-family: var(--font-mono);
            font-size: 9.5px; font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            display: block;
        }
        .transcript-entry.interviewer .speaker-label { color: var(--terra-300); }
        .transcript-entry.candidate .speaker-label { color: var(--forest-300); }
        .transcript-entry .transcript-text {
            color: rgba(247, 244, 236, 0.85);
        }

        /* Interim transcript — italic faded with blinking caret */
        .transcript-entry.interim .transcript-text {
            opacity: 0.55;
            font-style: italic;
        }
        .transcript-entry.interim::after {
            content: '';
            display: inline-block;
            width: 3px; height: 14px;
            background: var(--terra-400);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: ds-blink 0.85s step-end infinite;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- ============================================================= -->
        <!-- Header                                                          -->
        <!-- ============================================================= -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 18px;">
                <div class="ds-brand ds-brand--dark">
                    <span class="ds-brand-mark"></span>26Pixel
                </div>
                <div style="border-left: 1px solid rgba(247,244,236,0.12); padding-left: 18px;">
                    <h1>Live interview</h1>
                    <p class="subtitle">Real-time conversation with AI interviewer</p>
                </div>
            </div>
            <div class="header-meta">
                <div id="interviewTimer" class="interview-timer">
                    <div class="time-label">Time left</div>
                    <div id="timerDisplay" class="time-display">45:00</div>
                </div>
            </div>
        </div>

        <div id="statusBar" class="status-bar hidden"></div>

        <!-- ============================================================= -->
        <!-- Main layout                                                     -->
        <!-- ============================================================= -->
        <div class="main-layout">
            <!-- Left: video + controls -->
            <div class="left-panel">
                <div id="interviewInfo" class="interview-info">
                    <h3>Interview Details</h3>
                    <p><strong>Role</strong><span id="jobTitle"></span></p>
                    <p><strong>Candidate</strong><span id="candidateName"></span></p>
                    <p><strong>Questions</strong><span id="totalQuestions"></span></p>
                </div>

                <div class="video-container" id="videoContainer">
                    <div class="video-box" id="localVideoBox" data-monogram="You">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <div class="video-label">You</div>
                    </div>
                    <div class="video-box hidden" id="remoteVideoBox" data-monogram="A">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="video-label">Interviewer</div>
                    </div>
                </div>

                <div class="controls">
                    <a id="backBtnPre" href="/" class="btn-link btn-secondary">← Back to dashboard</a>
                    <button id="connectBtn" class="btn-primary">Connect to interview</button>
                    <button id="disconnectBtn" class="btn-danger hidden">End interview</button>
                </div>
            </div>

            <!-- Right: questions + transcript (revealed after connect) -->
            <div id="rightPanel" class="right-panel">
                <div class="question-panel">
                    <div class="question-panel-header">
                        <span>Questions</span>
                        <span><span id="qCurrent">-</span> / <span id="qTotal">-</span></span>
                    </div>
                    <div id="questionList" class="question-list"></div>
                </div>

                <div class="transcript-panel">
                    <div class="transcript-panel-header">
                        <span>Transcript</span>
                    </div>
                    <div id="transcriptList" class="transcript-list">
                        <div class="transcript-empty">Transcript will appear here once the interview begins.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var API_BASE = window.location.origin;
        var room = null;
        var interviewId = null;
        var idToken = null;

        // Get params
        var urlParams = new URLSearchParams(window.location.search);
        interviewId = urlParams.get('interview_id');
        idToken = urlParams.get('token') || sessionStorage.getItem('idToken');

        if (!interviewId || !idToken) {
            window.location.href = '/';
        }
        sessionStorage.setItem('idToken', idToken);
        window.history.replaceState({}, '', '?interview_id=' + interviewId);

        function authHeaders(extra) {
            var h = { 'Authorization': 'Bearer ' + idToken };
            if (extra) { for (var k in extra) h[k] = extra[k]; }
            return h;
        }

        var reportGenerating = false;

        var statusBar = document.getElementById('statusBar');
        var connectBtn = document.getElementById('connectBtn');
        var disconnectBtn = document.getElementById('disconnectBtn');
        var backBtnPre = document.getElementById('backBtnPre');
        var localVideo = document.getElementById('localVideo');
        var remoteVideo = document.getElementById('remoteVideo');
        var interviewInfo = document.getElementById('interviewInfo');
        var rightPanel = document.getElementById('rightPanel');

        function showStatus(message, type) {
            statusBar.textContent = message;
            statusBar.className = 'status-bar ' + type;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // ── Question panel state ──
        var revealedQuestions = {};
        var interviewTotalQuestions = 0;
        var activeQuestionIdx = -1;

        function handleQuestionMessage(msg) {
            var idx = msg.question_idx;

            // Store total from agent data (always accurate)
            if (msg.total) interviewTotalQuestions = msg.total;

            if (msg.status === 'active') {
                // Mark all previously active as answered
                for (var k in revealedQuestions) {
                    if (revealedQuestions[k].status === 'active') {
                        revealedQuestions[k].status = 'answered';
                    }
                }
                revealedQuestions[idx] = { text: msg.text, status: 'active' };
                activeQuestionIdx = idx;
            } else if (msg.status === 'answered') {
                if (revealedQuestions[idx]) revealedQuestions[idx].status = 'answered';
            } else if (msg.status === 'skipped') {
                if (revealedQuestions[idx]) revealedQuestions[idx].status = 'skipped';
            }

            renderQuestionList();
        }

        function renderQuestionList() {
            var listEl = document.getElementById('questionList');
            listEl.innerHTML = '';

            var keys = Object.keys(revealedQuestions).map(Number).sort(function(a,b){return a-b;});

            for (var i = 0; i < keys.length; i++) {
                var idx = keys[i];
                var q = revealedQuestions[idx];

                var icon = '';
                if (q.status === 'active') icon = '&#9679;';
                else if (q.status === 'answered') icon = '&#10003;';
                else if (q.status === 'skipped') icon = '&#8856;';

                var item = document.createElement('div');
                item.className = 'q-item ' + q.status;
                item.innerHTML = '<span class="q-icon">' + icon + '</span>' +
                    '<span>Q' + (idx + 1) + ': ' + escapeHtml(q.text) + '</span>';
                listEl.appendChild(item);

                if (q.status === 'active') {
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }

            // Header: "Question X of Y" where X = current question number, Y = total
            document.getElementById('qCurrent').textContent = activeQuestionIdx >= 0 ? (activeQuestionIdx + 1) : '-';
            document.getElementById('qTotal').textContent = interviewTotalQuestions || '-';
        }

        // ── Transcript panel state ──
        var candidateInterim = null;      // candidate's in-progress entry
        var interviewerInterim = null;    // interviewer's in-progress entry
        var transcriptStarted = false;

        function handleTranscript(msg) {
            var list = document.getElementById('transcriptList');

            // Clear placeholder on first message
            if (!transcriptStarted) {
                transcriptStarted = true;
                list.innerHTML = '';
            }

            var isFinal = msg.is_final;
            var speaker = msg.speaker;
            var label = speaker === 'interviewer' ? 'Interviewer' : 'You';

            if (!isFinal) {
                // Interim transcript — update in-place (create if needed)
                if (speaker === 'candidate') {
                    if (!candidateInterim) {
                        candidateInterim = document.createElement('div');
                        candidateInterim.className = 'transcript-entry candidate interim';
                        candidateInterim.innerHTML = '<span class="speaker-label">' + label + '</span>' +
                            '<span class="transcript-text"></span>';
                        list.appendChild(candidateInterim);
                    }
                    candidateInterim.querySelector('.transcript-text').textContent = msg.text;
                } else {
                    if (!interviewerInterim) {
                        interviewerInterim = document.createElement('div');
                        interviewerInterim.className = 'transcript-entry interviewer interim';
                        interviewerInterim.innerHTML = '<span class="speaker-label">' + label + '</span>' +
                            '<span class="transcript-text"></span>';
                        list.appendChild(interviewerInterim);
                    }
                    interviewerInterim.querySelector('.transcript-text').textContent = msg.text;
                }
                list.scrollTop = list.scrollHeight;
                return;
            }

            // Final transcript — solidify the interim entry or create a new one
            if (speaker === 'candidate' && candidateInterim) {
                candidateInterim.classList.remove('interim');
                candidateInterim.querySelector('.transcript-text').textContent = msg.text;
                candidateInterim = null;
            } else if (speaker === 'interviewer' && interviewerInterim) {
                interviewerInterim.classList.remove('interim');
                interviewerInterim.querySelector('.transcript-text').textContent = msg.text;
                interviewerInterim = null;
            } else {
                // No interim to solidify — create a fresh final entry
                var entry = document.createElement('div');
                entry.className = 'transcript-entry ' + speaker;
                entry.innerHTML = '<span class="speaker-label">' + label + '</span>' +
                    '<span class="transcript-text">' + escapeHtml(msg.text) + '</span>';
                list.appendChild(entry);
            }
            list.scrollTop = list.scrollHeight;
        }

        // ── Interview timer ──
        var timerRemainingSeconds = 0;
        var timerInterval = null;

        function handleTimer(msg) {
            // Sync with authoritative value from agent
            timerRemainingSeconds = msg.remaining_seconds;
            var timerEl = document.getElementById('interviewTimer');
            timerEl.classList.add('visible');

            // Start local countdown if not already running
            if (!timerInterval) {
                timerInterval = setInterval(function() {
                    if (timerRemainingSeconds > 0) {
                        timerRemainingSeconds--;
                    }
                    updateTimerDisplay();
                }, 1000);
            }

            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            var displayEl = document.getElementById('timerDisplay');
            var timerEl = document.getElementById('interviewTimer');
            var mins = Math.floor(timerRemainingSeconds / 60);
            var secs = timerRemainingSeconds % 60;
            displayEl.textContent = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;

            timerEl.classList.remove('warning', 'critical');
            if (timerRemainingSeconds <= 60) {
                timerEl.classList.add('critical');
            } else if (timerRemainingSeconds <= 300) {
                timerEl.classList.add('warning');
            }
        }

        // ── LiveKit connection ──
        async function connectToInterview() {
            try {
                showStatus('Starting real-time interview...', 'connecting');

                // Show interviewer pane + right panel
                document.getElementById('remoteVideoBox').classList.remove('hidden');
                document.getElementById('videoContainer').classList.add('two-up');

                var response = await fetch(API_BASE + '/api/v1/interviews/' + interviewId + '/start-realtime', {
                    method: 'POST',
                    headers: authHeaders()
                });
                if (!response.ok) throw new Error('Failed to start interview');
                var data = await response.json();

                // Get interview details
                var interviewResponse = await fetch(API_BASE + '/api/v1/interviews/' + interviewId, {
                    headers: authHeaders()
                });
                var interviewData = await interviewResponse.json();

                document.getElementById('jobTitle').textContent = interviewData.job_title;
                document.getElementById('candidateName').textContent = interviewData.candidate_info.name;
                document.getElementById('totalQuestions').textContent = interviewData.total_questions;
                interviewInfo.classList.add('visible');

                showStatus('Connecting to interview room...', 'connecting');

                var token = data.candidate_token;
                var url = data.livekit_url;

                var LivekitClient = window.LivekitClient;
                var Room = LivekitClient.Room;
                var RoomEvent = LivekitClient.RoomEvent;
                var createLocalTracks = LivekitClient.createLocalTracks;

                room = new Room({ adaptiveStream: true, dynacast: true });

                var INTERVIEWER_IDENTITIES = new Set(['interviewer-agent', 'technical-interviewer']);
                var remoteAudioEl = null;

                // Track subscribed — audio/video from interviewer
                room.on(RoomEvent.TrackSubscribed, function(track, publication, participant) {
                    var identity = participant ? participant.identity : 'unknown';
                    var isInterviewer = INTERVIEWER_IDENTITIES.has(identity) || identity !== room.localParticipant.identity;

                    if (track.kind === 'video' && isInterviewer) {
                        track.attach(remoteVideo);
                        document.getElementById('remoteVideoBox').classList.add('has-track');
                        showStatus('Interview in progress', 'connected');
                    } else if (track.kind === 'audio') {
                        var audioEl = document.createElement('audio');
                        audioEl.autoplay = true;
                        audioEl.playsInline = true;
                        document.body.appendChild(audioEl);
                        track.attach(audioEl);
                        audioEl.play().catch(function() {});
                        if (INTERVIEWER_IDENTITIES.has(identity)) remoteAudioEl = audioEl;
                    }
                });

                room.on(RoomEvent.TrackUnsubscribed, function(track, publication, participant) {
                    track.detach();
                    if (track.kind === 'video') {
                        document.getElementById('remoteVideoBox').classList.remove('has-track');
                    }
                    if (track.kind === 'audio' && remoteAudioEl) {
                        remoteAudioEl.pause();
                        remoteAudioEl.remove();
                        remoteAudioEl = null;
                    }
                });

                room.on(RoomEvent.ParticipantConnected, function(participant) {
                    if (INTERVIEWER_IDENTITIES.has(participant.identity)) {
                        console.log('[InterviewRoom] Interviewer joined:', participant.identity);
                        if (interviewerJoinTimeout) clearTimeout(interviewerJoinTimeout);
                        showStatus('Interviewer joined. Setting up...', 'connecting');
                    }
                });

                // Data channel — questions + transcript from agent
                room.on(RoomEvent.DataReceived, function(data, participant) {
                    try {
                        var msg = JSON.parse(new TextDecoder().decode(data));
                        if (msg.type === 'question') {
                            handleQuestionMessage(msg);
                        } else if (msg.type === 'transcript') {
                            handleTranscript(msg);
                        } else if (msg.type === 'timer') {
                            handleTimer(msg);
                        } else if (msg.type === 'interview_end') {
                            completeAndRedirect();
                        }
                    } catch (e) {
                        console.warn('Failed to parse data channel message:', e);
                    }
                });

                room.on(RoomEvent.Disconnected, function() {
                    if (!reportGenerating) {
                        showStatus('Disconnected. Redirecting...', 'connecting');
                        setTimeout(function() { window.location.href = '/'; }, 2500);
                    }
                });

                room.on(RoomEvent.ConnectionFailed, function(error) {
                    showStatus('Connection failed: ' + error.message, 'error');
                });

                room.on(RoomEvent.Reconnected, function() {
                    showStatus('Reconnected', 'connected');
                });

                // Connect
                await room.prepareConnection(url, token);
                await room.connect(url, token);

                // Local tracks
                var localTracks = await createLocalTracks({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } }
                });

                for (var i = 0; i < localTracks.length; i++) {
                    await room.localParticipant.publishTrack(localTracks[i]);
                    if (localTracks[i].kind === 'video') {
                        localTracks[i].attach(localVideo);
                        document.getElementById('localVideoBox').classList.add('has-track');
                    }
                }

                // Phase 1: connected, waiting for interviewer
                showStatus('Connected. Waiting for interviewer to join...', 'connecting');
                connectBtn.classList.add('hidden');
                backBtnPre.classList.add('hidden');
                disconnectBtn.classList.remove('hidden');
                rightPanel.classList.add('visible');

                // Check if interviewer already joined before event listeners were set up
                room.remoteParticipants.forEach(function(participant) {
                    if (INTERVIEWER_IDENTITIES.has(participant.identity)) {
                        console.log('[InterviewRoom] Interviewer already in room:', participant.identity);
                        showStatus('Interviewer joined. Setting up...', 'connecting');
                    }
                });

                // Warn if interviewer hasn't joined after 60 seconds
                var interviewerJoinTimeout = setTimeout(function() {
                    if (room && room.state === 'connected') {
                        var interviewerFound = false;
                        room.remoteParticipants.forEach(function(p) {
                            if (INTERVIEWER_IDENTITIES.has(p.identity)) interviewerFound = true;
                        });
                        if (!interviewerFound) {
                            console.warn('[InterviewRoom] Interviewer has not joined after 60s. Room:', room.name, 'State:', room.state, 'Participants:', room.remoteParticipants.size);
                        }
                    }
                }, 60000);

            } catch (error) {
                console.error('Error connecting:', error);
                showStatus('Error: ' + error.message, 'error');
            }
        }

        async function completeAndRedirect() {
            if (reportGenerating) return;
            reportGenerating = true;

            connectBtn.classList.add('hidden');
            disconnectBtn.classList.add('hidden');

            // Fire the complete request (report generates in background on server)
            fetch(API_BASE + '/api/v1/interviews/' + interviewId + '/complete', {
                method: 'POST',
                headers: authHeaders(),
                keepalive: true
            }).catch(function(e) {
                console.error('Error completing interview:', e);
            });

            // Redirect to dashboard immediately — report loading shows there
            window.location.href = '/';
        }

        async function disconnect() {
            if (room) {
                await room.disconnect();
                room = null;
            }
            await completeAndRedirect();
        }

        connectBtn.addEventListener('click', connectToInterview);
        disconnectBtn.addEventListener('click', disconnect);
    </script>
</body>
</html>
