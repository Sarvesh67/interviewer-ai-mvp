services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - interview_data:/app/interview_store
      - upload_data:/app/uploads
    restart: unless-stopped

  agent:
    build:
      context: .
      target: agent
    env_file: .env
    volumes:
      - interview_data:/app/interview_store
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  interview_data:
  upload_data:
