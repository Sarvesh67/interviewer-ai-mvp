services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewer
      POSTGRES_PASSWORD: interviewer
      POSTGRES_DB: interviewer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://interviewer:interviewer@postgres:5432/interviewer"
    volumes:
      - interview_data:/app/interview_store
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: .
      target: agent
    env_file: .env
    volumes:
      - interview_data:/app/interview_store
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  interview_data:
  upload_data:
